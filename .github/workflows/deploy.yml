name: Deploy

on:
  push:
    branches: [dev, main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: logue-ecr
  CONTAINER_NAME: logue
  APP_PORT: 8080

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── 환경 분기 (dev → stg, main → prod) ──────────────────────────────
      - name: Resolve environment config
        id: cfg
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod"  >> $GITHUB_OUTPUT
            echo "role=arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gh-actions-deploy-prod" >> $GITHUB_OUTPUT
          else
            echo "env=stg"   >> $GITHUB_OUTPUT
            echo "role=arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gh-actions-deploy-stg"  >> $GITHUB_OUTPUT
          fi

      # ── AWS 인증 ────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # ── Java 빌드 ───────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # ── ECR 로그인 & 이미지 푸시 ─────────────────────────────────────────
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: docker
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO:$TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── SSM으로 EC2 배포 ─────────────────────────────────────────────────
      - name: Deploy to EC2 via SSM
        env:
          ENV: ${{ steps.cfg.outputs.env }}
          IMAGE: ${{ steps.docker.outputs.image }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # 헤어독 안에서 $ENV, $IMAGE, $REGISTRY, $AWS_REGION은 Actions 러너에서 치환됨
          # EC2에서 실행될 쉘 변수(\$...)는 역슬래시로 보호
          cat > /tmp/ssm-params.json << ENDJSON
          {
            "commands": [
              "set -e",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY",
              "docker pull $IMAGE",
              "aws ssm get-parameters-by-path --region $AWS_REGION --path /logue/$ENV/ --recursive --with-decryption --output json --query 'Parameters[*]' | python3 -c \"import sys,json; params=json.load(sys.stdin); open('/tmp/.logue.env','w').write(''.join([p['Name'].split('/')[-1]+'='+p['Value']+chr(10) for p in params]))\"",
              "docker stop $CONTAINER_NAME 2>/dev/null || true",
              "docker rm   $CONTAINER_NAME 2>/dev/null || true",
              "docker run -d --name $CONTAINER_NAME --restart unless-stopped -p $APP_PORT:8080 -e SPRING_PROFILES_ACTIVE=$ENV --env-file /tmp/.logue.env $IMAGE",
              "rm -f /tmp/.logue.env",
              "docker image prune -f"
            ]
          }
          ENDJSON

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Env,Values=$ENV" \
            --parameters "$(cat /tmp/ssm-params.json)" \
            --comment "Deploy ${{ github.sha }} to $ENV" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # 완료 대기 (최대 5분)
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --region "$AWS_REGION" \
              --details \
              --query "CommandInvocations[0].StatusDetails" \
              --output text 2>/dev/null || echo "Pending")
            echo "  [$i/30] Status: $STATUS"
            case "$STATUS" in
              Success)
                echo "Deploy succeeded"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut)
                echo "Deploy failed: $STATUS"
                # 실패 로그 출력
                aws ssm list-command-invocations \
                  --command-id "$COMMAND_ID" \
                  --region "$AWS_REGION" \
                  --details \
                  --query "CommandInvocations[0].CommandPlugins[0].Output" \
                  --output text
                exit 1
                ;;
            esac
          done
          echo "Timed out waiting for deploy"
          exit 1
